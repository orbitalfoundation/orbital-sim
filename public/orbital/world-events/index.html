<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>World Events — Orbital</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #07070e; --surface: #0f0f1c; --border: #1e1e30;
    --accent: #0fd4bc; --text: #dcdce8; --muted: #9090b0;
    --mono: ui-monospace, monospace; --sans: ui-sans-serif, system-ui, sans-serif;
  }
  html, body { width: 100%; height: 100%; background: var(--bg); color: var(--text); font-family: var(--sans); font-size: 14px; overflow: hidden; }
  #canvas { position: fixed; inset: 0; }

  /* ---- overlays ---- */
  .overlay { position: fixed; z-index: 10; }

  #header {
    top: 0; left: 0; right: 0;
    display: flex; align-items: center; gap: 16px;
    padding: 12px 20px;
    background: linear-gradient(to bottom, rgba(7,7,14,.9) 0%, transparent 100%);
  }
  .wordmark { font-family: var(--mono); font-size: 11px; letter-spacing: .2em; text-transform: uppercase; color: var(--muted); text-decoration: none; }
  .title { font-size: 13px; color: var(--text); opacity: .7; }
  .controls { margin-left: auto; display: flex; align-items: center; gap: 10px; }
  select {
    font-family: var(--mono); font-size: 11px; background: var(--surface);
    color: var(--text); border: 1px solid var(--border); padding: 4px 8px; cursor: pointer;
  }

  #stats {
    top: 56px; left: 20px;
    font-family: var(--mono); font-size: 11px; color: var(--muted); line-height: 1.8;
  }
  #stats .big { font-size: 22px; color: var(--accent); font-family: var(--mono); }

  #legend {
    top: 56px; right: 20px;
    font-family: var(--mono); font-size: 10px; color: var(--muted); line-height: 2;
  }
  .dot { display: inline-block; width: 10px; height: 10px; border-radius: 50%; margin-right: 6px; vertical-align: middle; }

  #timeline {
    bottom: 0; left: 0; right: 0;
    padding: 16px 24px 20px;
    background: linear-gradient(to top, rgba(7,7,14,.95) 0%, transparent 100%);
  }
  #date-label { font-family: var(--mono); font-size: 13px; color: var(--accent); margin-bottom: 8px; }
  .slider-row { display: flex; align-items: center; gap: 12px; }
  #slider { flex: 1; accent-color: var(--accent); height: 4px; }
  #play-btn {
    font-family: var(--mono); font-size: 11px; border: 1px solid var(--accent);
    color: var(--accent); background: transparent; padding: 5px 14px; cursor: pointer;
    transition: background .15s, color .15s; white-space: nowrap;
  }
  #play-btn:hover { background: var(--accent); color: var(--bg); }
  #source-info { margin-top: 6px; font-family: var(--mono); font-size: 10px; color: var(--muted); }

  #loading {
    position: fixed; inset: 0; background: var(--bg);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 12px; font-family: var(--mono); font-size: 12px; color: var(--muted); z-index: 100;
  }
  #loading.hidden { display: none; }
</style>
</head>
<body>

<canvas id="canvas"></canvas>

<div id="header" class="overlay">
  <a href="/" class="wordmark">Orbital</a>
  <span class="title">World Events</span>
  <div class="controls">
    <select id="source-select">
      <option value="gdelt">GDELT (real-time)</option>
      <option value="ucdp">UCDP (historical)</option>
      <option value="acled">ACLED (curated)</option>
    </select>
  </div>
</div>

<div id="stats" class="overlay">
  <div class="big" id="stat-count">—</div>
  <div>events on this date</div>
  <div id="stat-material" style="margin-top:6px">— material conflict</div>
  <div id="stat-verbal">— verbal conflict</div>
</div>

<div id="legend" class="overlay">
  <div><span class="dot" style="background:#ef4444"></span>Material conflict</div>
  <div><span class="dot" style="background:#f59e0b"></span>Verbal conflict</div>
  <div style="margin-top:6px;font-size:9px;opacity:.6">Dot size ∝ mentions / fatalities</div>
</div>

<div id="timeline" class="overlay">
  <div id="date-label">Loading…</div>
  <div class="slider-row">
    <input type="range" id="slider" min="0" max="0" value="0">
    <button id="play-btn">Play ▶</button>
  </div>
  <div id="source-info"></div>
</div>

<div id="loading">
  <div style="font-size:13px;color:var(--text)">World Events</div>
  <div>Loading globe…</div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script type="importmap">
{
  "imports": {
    "three":         "https://cdn.jsdelivr.net/npm/three@0.165.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.165.0/examples/jsm/"
  }
}
</script>
<script type="module">
import { createGlobe } from '/assets/viz/globe.js';

// ---- globe (via shared viz package) ----
const container = document.getElementById('canvas').parentElement;
document.getElementById('canvas').remove(); // viz creates its own canvas

const globe = await createGlobe(container, {
  fallbackTexture: '/assets/earth.jpg',
  mode:            'globe',
  autoRotate:      true,
  autoRotateSpeed: 0.0002,
  stars:           true,
});

function renderEvents(events) {
  let nMaterial = 0, nVerbal = 0;
  const points = events.map(e => {
    const lat = e.latitude ?? e.ActionGeo_Lat;
    const lon = e.longitude ?? e.ActionGeo_Long;
    if (!lat || !lon) return null;
    const quad     = e.quad_class ?? e.QuadClass ?? (e.type_of_violence ? 4 : 3);
    const material = quad === 4;
    if (material) nMaterial++; else nVerbal++;
    const mentions = e.num_mentions ?? e.deaths_best ?? e.fatalities ?? 1;
    return {
      lat, lon,
      color: material ? 0xef4444 : 0xf59e0b,
      size:  Math.min(0.06, Math.max(0.018, Math.sqrt(mentions + 1) * 0.006)),
    };
  }).filter(Boolean);

  globe.addPoints('events', points);

  document.getElementById('stat-count').textContent    = events.length;
  document.getElementById('stat-material').textContent = `${nMaterial} material conflict`;
  document.getElementById('stat-verbal').textContent   = `${nVerbal} verbal conflict`;
}

// ---- bus query protocol ----
// One mechanism for all data — no per-resource REST endpoints.
const socket = io();

function busQuery(key, args = {}) {
  return new Promise((resolve, reject) => {
    const id = Math.random().toString(36).slice(2);
    const timer = setTimeout(() => reject(new Error('query timeout')), 15_000);
    socket.once(`response:${id}`, ({ ok, result, error }) => {
      clearTimeout(timer);
      ok ? resolve(result) : reject(new Error(error));
    });
    socket.emit('query', { id, key, args });
  });
}

// ---- city dots (via viz globe addPoints) ----
async function loadCities() {
  try {
    const cities = await busQuery('cities_query', { largest: 1000 });
    if (!cities?.length) return;
    const points = cities
      .filter(c => (c.population ?? 0) >= 100_000)
      .map(c => {
        const pop = c.population ?? 0;
        const s = 0.003 + 0.017 * Math.max(0, Math.log10(pop) - 5) / 2.5;
        return { lat: c.latitude, lon: c.longitude, color: 0x0fd4bc,
                 size: Math.min(0.022, Math.max(0.004, s)) };
      });
    globe.addPoints('cities', points);
  } catch (e) { console.warn('[cities]', e.message); }
}

// ---- date slider ----
const slider       = document.getElementById('slider');
const dateLabel    = document.getElementById('date-label');
const playBtn      = document.getElementById('play-btn');
const sourceInfo   = document.getElementById('source-info');
const sourceSelect = document.getElementById('source-select');

let dates    = [];
let current  = 0;
let playing  = false;
let playTimer= null;

async function loadDates(source) {
  try {
    const key = `${source}_query`;
    dates = await busQuery(key, { dates: true }) ?? [];
  } catch { dates = []; }
  slider.max   = Math.max(0, dates.length - 1);
  slider.value = slider.max;
  current      = dates.length - 1;
  updateDate();
  document.getElementById('loading').classList.add('hidden');
}

async function updateDate() {
  if (!dates.length) { dateLabel.textContent = 'No data — world bus agents are syncing…'; return; }
  const date = dates[current];
  dateLabel.textContent = date;
  try {
    const key    = `${sourceSelect.value}_query`;
    const events = await busQuery(key, { date }) ?? [];
    renderEvents(events);
  } catch (e) { console.warn('[events]', e.message); }
}

slider.addEventListener('input', () => {
  current = Number(slider.value);
  updateDate();
});

playBtn.addEventListener('click', () => {
  playing = !playing;
  playBtn.textContent = playing ? 'Pause ⏸' : 'Play ▶';
  if (playing) {
    playTimer = setInterval(() => {
      current = (current + 1) % dates.length;
      slider.value = current;
      updateDate();
    }, 1000);
  } else {
    clearInterval(playTimer);
  }
});

sourceSelect.addEventListener('change', () => loadDates(sourceSelect.value));

// Init — wait for socket connection, then load dates
async function refreshStatus() {
  try {
    const source = sourceSelect.value;
    const [count, latest, cityCount] = await Promise.all([
      busQuery(`${source}_query`, { count: true }),
      busQuery(`${source}_query`, { latest: true }),
      busQuery('cities_query', { count: true }),
    ]);
    const evtStr  = count > 0
      ? `${count.toLocaleString()} events · latest: ${latest ?? '—'}`
      : 'syncing events…';
    const cityStr = cityCount > 0 ? `${cityCount.toLocaleString()} cities` : 'syncing cities…';
    sourceInfo.textContent = `${evtStr}   ·   ${cityStr}`;
  } catch {}
}

// Start the world-events sim on connect so this session has its own bus
// with all the data agents loaded. Queries are routed to that bus.
let _worldSimId = null;

socket.on('connect', async () => {
  if (!_worldSimId) {
    try {
      const res = await fetch('/api/sim', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          manifest: 'public/orbital/world-events/manifest.js',
          hz: 1/300,   // one tick per 5 minutes — just enough for SWR refreshes
          dt: 1,
        }),
      });
      if (res.ok) {
        _worldSimId = (await res.json()).id;
        socket.emit('subscribe', _worldSimId);
      }
    } catch (e) { console.warn('[world-events] could not start sim:', e.message); }
  }
  // Small delay so agents have time to register before first query
  await new Promise(r => setTimeout(r, 500));
  await refreshStatus();
  await loadDates(sourceSelect.value);
  await loadCities();
});

socket.on('disconnect', () => {
  // Server idle timeout handles cleanup; clear local ref
  _worldSimId = null;
});

// Animation loop is handled by the viz globe.
</script>
</body>
</html>
