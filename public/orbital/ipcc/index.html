<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>IPCC AR6 — Orbital</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:      #07070e;
    --surface: #0f0f1c;
    --border:  #1e1e30;
    --accent:  #0fd4bc;
    --text:    #dcdce8;
    --muted:   #9090b0;
    --mono:    ui-monospace, monospace;
    --sans:    ui-sans-serif, system-ui, sans-serif;
  }

  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    font-size: 14px;
    line-height: 1.6;
    height: 100%;
  }

  body {
    display: flex;
    flex-direction: column;
    min-height: 100dvh;
  }

  /* ---- header ---- */
  header {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 12px 20px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .wordmark {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
    text-decoration: none;
  }

  .title {
    font-size: 13px;
    color: var(--text);
    opacity: 0.7;
  }

  .controls {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .scenario-badge {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    border: 1px solid var(--border);
    padding: 3px 8px;
  }

  button {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.05em;
    cursor: pointer;
    border: 1px solid var(--accent);
    background: transparent;
    color: var(--accent);
    padding: 5px 14px;
    transition: background 0.15s, color 0.15s;
  }

  button:hover { background: var(--accent); color: var(--bg); }
  button:disabled { opacity: 0.3; cursor: default; }
  button:disabled:hover { background: transparent; color: var(--accent); }

  button.stop {
    border-color: var(--muted);
    color: var(--muted);
  }
  button.stop:hover { background: var(--muted); color: var(--bg); }

  /* ---- main: map fills remaining space ---- */
  main {
    position: relative;
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  #map {
    width: 100%;
    height: 100%;
    object-fit: contain;
    display: block;
    opacity: 0;
    transition: opacity 0.4s ease;
  }

  #map.visible { opacity: 1; }

  /* placeholder shown before first frame */
  #placeholder {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    color: var(--muted);
    font-family: var(--mono);
    font-size: 12px;
    pointer-events: none;
  }

  #placeholder.hidden { display: none; }

  /* ---- stats overlay ---- */
  #stats {
    position: absolute;
    bottom: 20px;
    left: 20px;
    display: flex;
    gap: 24px;
    background: rgba(7,7,14,0.75);
    border: 1px solid var(--border);
    padding: 10px 16px;
    backdrop-filter: blur(4px);
  }

  .stat { display: flex; flex-direction: column; gap: 2px; }

  .stat-label {
    font-family: var(--mono);
    font-size: 9px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .stat-value {
    font-family: var(--mono);
    font-size: 20px;
    font-weight: 400;
    color: var(--text);
    min-width: 5ch;
  }

  .stat-value.accent { color: var(--accent); }

  /* ---- colour legend ---- */
  #legend {
    position: absolute;
    bottom: 20px;
    right: 20px;
    background: rgba(7,7,14,0.75);
    border: 1px solid var(--border);
    padding: 10px 14px;
    backdrop-filter: blur(4px);
  }

  .legend-label {
    font-family: var(--mono);
    font-size: 9px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 6px;
  }

  .legend-bar {
    width: 120px;
    height: 10px;
    background: linear-gradient(to right,
      #fffcdc,
      #ffeb96,
      #ffc83c,
      #f0820f,
      #d23c0f,
      #aa140a,
      #500014
    );
  }

  .legend-ticks {
    display: flex;
    justify-content: space-between;
    font-family: var(--mono);
    font-size: 9px;
    color: var(--muted);
    margin-top: 3px;
  }

  /* ---- status strip ---- */
  #status-bar {
    padding: 6px 20px;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    border-top: 1px solid var(--border);
    flex-shrink: 0;
    min-height: 28px;
  }
</style>
</head>
<body>

<header>
  <a href="/" class="wordmark">Orbital</a>
  <span class="title">IPCC AR6 — Global Warming Scenarios</span>
  <div class="controls">
    <span class="scenario-badge" id="scenario-label">SSP2-4.5</span>
    <button id="btn-run">Run ▶</button>
    <button id="btn-stop" class="stop" style="display:none">Stop ■</button>
  </div>
</header>

<main>
  <img id="map" alt="Temperature anomaly map">

  <div id="placeholder">
    <div style="font-size:11px;opacity:0.5">Temperature anomaly relative to pre-industrial (1850) baseline</div>
    <div style="opacity:0.35">Press Run to start</div>
  </div>

  <div id="stats">
    <div class="stat">
      <div class="stat-label">Year</div>
      <div class="stat-value accent" id="val-year">—</div>
    </div>
    <div class="stat">
      <div class="stat-label">CO₂</div>
      <div class="stat-value" id="val-co2">— ppm</div>
    </div>
    <div class="stat">
      <div class="stat-label">Global ΔT</div>
      <div class="stat-value" id="val-dt">—</div>
    </div>
    <div class="stat">
      <div class="stat-label">Scenario</div>
      <div class="stat-value" id="val-scenario" style="font-size:13px">SSP2-4.5</div>
    </div>
  </div>

  <div id="legend">
    <div class="legend-label">Temperature anomaly</div>
    <div class="legend-bar"></div>
    <div class="legend-ticks">
      <span>0°C</span><span>2°C</span><span>4°C</span><span>6°C+</span>
    </div>
  </div>
</main>

<div id="status-bar">Ready.</div>

<script src="/socket.io/socket.io.js"></script>
<script>
const MANIFEST = 'public/orbital/ipcc/manifest.js';
const HZ       = 4;     // ticks per second — 76 years in ~19 s
const DT       = 31536000; // seconds per year

const map        = document.getElementById('map');
const placeholder= document.getElementById('placeholder');
const btnRun     = document.getElementById('btn-run');
const btnStop    = document.getElementById('btn-stop');
const statusBar  = document.getElementById('status-bar');
const valYear    = document.getElementById('val-year');
const valCo2     = document.getElementById('val-co2');
const valDt      = document.getElementById('val-dt');

let simId    = null;
let socket   = null;
let prevBlobUrl = null;

function status(msg) { statusBar.textContent = msg; }

function showFrame(buf) {
  const blob = new Blob([buf], { type: 'image/png' });
  const url  = URL.createObjectURL(blob);
  map.onload = () => {
    if (prevBlobUrl) URL.revokeObjectURL(prevBlobUrl);
    prevBlobUrl = url;
    map.classList.add('visible');
    placeholder.classList.add('hidden');
  };
  map.src = url;
}

function updateStats({ year, co2, deltaT }) {
  if (year  != null) valYear.textContent = year;
  if (co2   != null) valCo2.textContent  = Math.round(co2) + ' ppm';
  if (deltaT != null) {
    const sign = deltaT >= 0 ? '+' : '';
    valDt.textContent = sign + deltaT.toFixed(2) + '°C';
  }
}

async function startRun() {
  btnRun.disabled = true;
  status('Starting simulation…');

  let res;
  try {
    res = await fetch('/api/sim', {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({ manifest: MANIFEST, hz: HZ, dt: DT }),
    });
  } catch (err) {
    status('Error: ' + err.message);
    btnRun.disabled = false;
    return;
  }

  if (!res.ok) {
    status('Error: ' + await res.text());
    btnRun.disabled = false;
    return;
  }

  const { id } = await res.json();
  simId = id;

  socket = io();
  socket.emit('subscribe', id);

  socket.on('tick', data => {
    updateStats({ year: data.year, co2: data.co2, deltaT: data.deltaT });
    if (data.year) status(`Running — ${data.year}`);
  });

  socket.on('frame', ({ year, buf }) => {
    showFrame(buf);
    status(`Frame: ${year}`);
  });

  socket.on('stopped', () => {
    status('Stopped.');
    simId = null;
    btnRun.disabled = false;
    btnStop.style.display = 'none';
    btnRun.style.display  = '';
    socket?.disconnect();
    socket = null;
  });

  btnStop.style.display = '';
  btnRun.style.display  = 'none';
  status('Running…');
}

async function stopRun() {
  if (!simId) return;
  btnStop.disabled = true;
  await fetch(`/api/sim/${simId}`, { method: 'DELETE' });
  // stopped event will fire and clean up
}

btnRun.addEventListener('click', startRun);
btnStop.addEventListener('click', stopRun);
</script>
</body>
</html>
