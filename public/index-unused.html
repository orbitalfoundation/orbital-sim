<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Orbital Simulations</title>
<style>
  :root { color-scheme: light dark; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: ui-monospace, monospace;
    font-size: 14px;
    background: light-dark(#f5f5f0, #0d0d12);
    color: light-dark(#1a1a2e, #c8c8d8);
    padding: 3rem 2rem;
    max-width: 860px;
    margin: 0 auto;
  }
  h1 { font-size: 1.1rem; font-weight: 600; letter-spacing: 0.05em; margin-bottom: 0.3rem; }
  p.sub { color: light-dark(#666, #888); margin-bottom: 2.5rem; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 1px; background: light-dark(#ddd, #222); border: 1px solid light-dark(#ddd, #222); }
  .card {
    background: light-dark(#f5f5f0, #0d0d12);
    padding: 1.2rem 1.4rem;
    text-decoration: none;
    color: inherit;
    display: block;
    transition: background 0.1s;
  }
  .card:hover { background: light-dark(#e8e8e0, #16161f); }
  .card .name { font-weight: 600; margin-bottom: 0.25rem; }
  .card .desc { color: light-dark(#666, #888); font-size: 0.85rem; }
</style>
</head>
<body>
<h1>ORBITAL</h1>
<p class="sub">Simulation workspace — browse by namespace.</p>
<div class="grid">
  <a class="card" href="/anselm/">
    <div class="name">anselm/</div>
    <div class="desc">Personal scenarios and experiments.</div>
  </a>
  <a class="card" href="/orbital/">
    <div class="name">orbital/</div>
    <div class="desc">Shared baselines and planetary agents.</div>
  </a>
</div>
</body>
</html>
